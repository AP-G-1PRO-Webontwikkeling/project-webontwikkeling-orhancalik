<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footballers Overview</title>
</head>
<body>
    <h1>Footballers Overview</h1>
    <form action="/filter" method="GET">
      <label for="name">Filter by Name:</label>
      <input type="text" id="name" name="name">
      <button type="submit">Filter</button>
    </form>
    <table>
      <thead>
        <tr>
          <th id="nameHeader" onclick="sortFootballers('name')" data-order="asc">Name</th>
          <th id="ageHeader" onclick="sortFootballers('age')" data-order="asc">Age</th>
          <th id="activeHeader" onclick="sortFootballers('active')" data-order="asc">Active</th>
          <th id="clubHeader" onclick="sortFootballers('club')" data-order="asc">Club</th>
        </tr>
      </thead>
      <tbody id="footballersTableBody">
        <!-- Voetballersgegevens worden hier dynamisch ingevoegd -->
      </tbody>
    </table>

    <script>
      async function loadFootballersData() {
            try {
              const response = await fetch('../json/footballers.json');
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error loading footballers data:', error);
                return [];
            }
        }

        async function insertFootballersDataIntoTable() {
            const footballersData = await loadFootballersData();
            const tableBody = document.getElementById('footballersTableBody');
            tableBody.innerHTML = '';

            footballersData.forEach(footballer => {
                const row = `
                    <tr>
                        <td>${footballer.name}</td>
                        <td>${footballer.age}</td>
                        <td>${footballer.active ? 'Yes' : 'No'}</td>
                        <td>${footballer.clubDetails.clubName}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        insertFootballersDataIntoTable();
    </script>
</body>
</html>
